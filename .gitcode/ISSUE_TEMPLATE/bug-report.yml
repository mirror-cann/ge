name: 🐛 Bug-Report|缺陷反馈
description: 当您发现了一个缺陷，需要向社区反馈时，请使用此模板。
title: "[Bug-Report|缺陷反馈]: "
labels: ["bug-report"]
body:
  - type: checkboxes
    id: terms
    attributes:
      label: 在您提交issue前，请确认以下信息：
      options:
        - label: 我已经搜索过[现有和历史issues](https://gitcode.com/cann/ge/issues)，确认这是一个新问题
          required: true
  - type: textarea
    attributes:
      label: 问题描述
      description: 提供尽可能多的信息描述产生了什么问题
    validations:
      required: true
  - type: textarea
    attributes:
      label: 环境信息
      description: 请提供昇腾硬件型号与软件环境信息
    validations:
      required: true
  - type: textarea
    attributes:
      label: 重现步骤
      description: 提供尽可能多的信息描述如何重现该缺陷
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期结果
      description: 描述期望的行为应该是什么样子的
    validations:
      required: true
  - type: textarea
    attributes:
      label: 日志 / 截图
      description: 提供尽可能多的日志/结果信息
    validations:
      required: true
  - type: textarea
    attributes:
      label: 备注
      description: 补充下其他您认为需要提供的信息
    validations:
      required: false
